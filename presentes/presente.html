<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="../img/logo_laranja.png" type="image/x-icon" />
  <title>Detalhe do Presente - Giovanna & Erick</title>

  <!-- Mercado Pago SDK Produção -->
  <script src="https://sdk.mercadopago.com/js/v2"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @font-face {
      font-family: "Oleragie";
      src: url("../fonts/Oleragie.otf") format("opentype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Satoshi";
      src: url("../fonts/Satoshi-Variable.ttf") format("truetype");
      font-weight: 300 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      /* CORES PADRÃO DO SITE */
      --rosa-protagonista: #e83a6d;
      --laranja-energia: #ed4b14;
      --amarelo-alegria: #feb423;
      --creme-suavidade: #fee3b4;
      --marrom-base: #3a2a1f;
      --marrom-claro: #5e4130;
      --terracota: #d96c2b;
      --branco: #ffffff;

      --font-titulos:
        "Oleragie", "Playfair Display", Georgia, "Times New Roman", serif;
      --font-paragrafos:
        "Satoshi", "Jost", -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;

      --section-pad: clamp(4rem, 8vw, 7rem);
    }

    body {
      background: var(--creme-suavidade);
      color: var(--marrom-base);
      font-family: var(--font-paragrafos);
      font-weight: 300;
      line-height: 1.75;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(1200px, 92%);
      margin-inline: auto;
    }

    /* Navbar - com fundo transparente para logo branco */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1.25rem 0;
      background: var(--laranja-energia);
      backdrop-filter: blur(14px);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .nav__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav__logo {
      display: block;
      line-height: 0;
    }

    .nav__logo-image {
      height: 45px;
      width: auto;
      display: block;
      transition: transform 0.3s ease;
      filter: brightness(0) invert(1);
    }

    .nav__logo-image:hover {
      transform: scale(1.02);
    }

    .nav__links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav__links a {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 500;
      font-family: var(--font-paragrafos);
      color: var(--branco);
      transition: color 0.2s;
      position: relative;
      padding-bottom: 4px;
    }

    .nav__links a:hover,
    .nav__links a.active {
      color: var(--amarelo-alegria);
    }

    .nav__links a::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1.5px;
      background: var(--amarelo-alegria);
      transition: width 0.3s ease;
    }

    .nav__links a:hover::after {
      width: 100%;
    }

    .nav__toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .nav__toggle span {
      display: block;
      width: 24px;
      height: 1.5px;
      background: var(--branco);
      transition:
        transform 0.3s,
        opacity 0.3s;
    }

    .presente-detalhe {
      min-height: 80vh;
      padding: 8rem 0 3rem;
      position: relative;
    }

    .detalhe-card {
      background: var(--branco);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(58, 42, 31, 0.08);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .detalhe-imagem {
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .detalhe-imagem img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .detalhe-placeholder {
      font-size: 8rem;
      opacity: 0.7;
    }

    .detalhe-info {
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .detalhe-categoria {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--terracota);
      font-weight: 500;
      display: inline-block;
    }

    .detalhe-info h1 {
      font-family: var(--font-paragrafos);
      font-size: 2rem;
      line-height: 1;
      font-weight: 600;
      color: var(--marrom-base);
    }

    .detalhe-ribbon {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 99px;
      width: fit-content;
    }

    .ribbon--priority {
      background: var(--laranja-energia);
      color: var(--branco);
    }

    .ribbon--available {
      background: rgba(254, 180, 35, 0.2);
      color: #8a6800;
    }

    .ribbon--gifted {
      background: rgba(232, 58, 109, 0.12);
      color: var(--rosa-protagonista);
    }

    .detalhe-preco {
      background: linear-gradient(135deg,
          rgba(232, 58, 109, 0.05) 0%,
          rgba(254, 180, 35, 0.05) 100%);
      padding: 1rem 1.25rem;
      border-radius: 12px;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .detalhe-preco strong {
      font-family: var(--font-paragrafos);
      font-weight: 600;
      color: var(--marrom-base);
    }

    .detalhe-preco span {
      font-family: var(--font-paragrafos);
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--rosa-protagonista);
    }

    .detalhe-descricao {
      font-family: var(--font-paragrafos);
      color: var(--marrom-claro);
      line-height: 1.6;
      font-size: 1rem;
    }

    .detalhe-especificacoes {
      margin-top: 0.5rem;
    }

    .detalhe-especificacoes h3 {
      font-family: var(--font-paragrafos);
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--marrom-base);
    }

    .detalhe-especificacoes ul {
      list-style: none;
      padding-left: 1rem;
    }

    .detalhe-especificacoes li {
      margin-bottom: 0.5rem;
      position: relative;
      font-size: 0.9rem;
      color: var(--marrom-claro);
    }

    .detalhe-especificacoes li::before {
      content: "✦";
      color: var(--rosa-protagonista);
      position: absolute;
      left: -1rem;
    }

    .detalhe-endereco {
      background: linear-gradient(135deg,
          rgba(254, 180, 35, 0.08) 0%,
          rgba(232, 58, 109, 0.08) 100%);
      border-radius: 16px;
      padding: 1rem 1.25rem;
      margin: 0.5rem 0;
      border: 1px solid rgba(232, 58, 109, 0.2);
    }

    .endereco-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .endereco-header svg {
      color: var(--rosa-protagonista);
      stroke: var(--rosa-protagonista);
    }

    .endereco-header h3 {
      font-family: var(--font-paragrafos);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--marrom-base);
      margin: 0;
    }

    .endereco-conteudo {
      padding-left: 1.75rem;
    }

    .endereco-conteudo p {
      font-size: 0.85rem;
      color: var(--marrom-claro);
      margin-bottom: 0.25rem;
      line-height: 1.4;
    }

    .btn-copiar-endereco-mini {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      border: 1px solid var(--rosa-protagonista);
      color: var(--rosa-protagonista);
      padding: 0.3rem 0.75rem;
      border-radius: 99px;
      font-family: var(--font-paragrafos);
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
    }

    .btn-copiar-endereco-mini:hover {
      background: var(--rosa-protagonista);
      color: var(--branco);
    }

    .btn-copiar-endereco-mini:hover svg {
      stroke: var(--branco);
    }

    .detalhe-acoes {
      margin-top: 0.5rem;
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn-group>* {
      flex: 1;
      min-width: 180px;
    }

    .btn-externo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: transparent;
      border: 2px solid var(--marrom-claro);
      color: var(--marrom-claro);
      padding: 1rem 2rem;
      font-family: var(--font-paragrafos);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn-externo:hover {
      background: var(--marrom-claro);
      color: var(--branco);
      transform: translateY(-2px);
      border-color: var(--marrom-claro);
    }

    .btn-externo:active {
      transform: translateY(0);
    }

    .btn-presentear {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: var(--rosa-protagonista);
      color: var(--branco);
      border: none;
      padding: 1rem 2rem;
      font-family: var(--font-paragrafos);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }

    .btn-presentear:hover {
      background: var(--terracota);
      transform: translateY(-2px);
    }

    .btn-presentear:active {
      transform: translateY(0);
    }

    .btn-externo svg,
    .btn-presentear svg {
      flex-shrink: 0;
    }

    /* Responsivo para botões */
    @media (max-width: 600px) {
      .btn-group {
        flex-direction: column;
        gap: 0.75rem;
      }

      .btn-group>* {
        min-width: auto;
      }

      .btn-externo,
      .btn-presentear {
        padding: 0.875rem 1.5rem;
        font-size: 0.8rem;
      }

      .btn-externo svg,
      .btn-presentear svg {
        width: 18px;
        height: 18px;
      }
    }

    @media (max-width: 380px) {

      .btn-externo,
      .btn-presentear {
        padding: 0.75rem 1.25rem;
        font-size: 0.75rem;
      }

      .btn-externo svg,
      .btn-presentear svg {
        width: 16px;
        height: 16px;
      }
    }

    .mensagem-gifted {
      text-align: center;
      padding: 1rem;
      background: rgba(232, 58, 109, 0.1);
      border-radius: 12px;
      color: var(--rosa-protagonista);
      font-family: var(--font-paragrafos);
      font-style: italic;
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 4rem;
    }

    .loading p {
      color: var(--marrom-claro);
      font-size: 1.1rem;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--creme-suavidade);
      border-radius: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(58, 42, 31, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-family: var(--font-titulos);
      font-size: 1rem;
      font-weight: 500;
      color: var(--marrom-base);
      margin-top: 1.5rem;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--marrom-claro);
    }

    .modal-body {
      padding: 1.5rem;
    }

    .payment-methods {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .payment-btn {
      flex: 1;
      padding: 0.75rem;
      background: transparent;
      border: 1.5px solid rgba(58, 42, 31, 0.2);
      border-radius: 12px;
      cursor: pointer;
      font-family: var(--font-paragrafos);
      transition: all 0.3s ease;
    }

    .payment-btn.active {
      border-color: var(--rosa-protagonista);
      background: rgba(232, 58, 109, 0.1);
      color: var(--rosa-protagonista);
    }

    .payment-content {
      display: none;
    }

    .payment-content.active {
      display: block;
    }

    #pixEmail {
      width: 100%;
      padding: 0.75rem;
      border: 1.5px solid rgba(58, 42, 31, 0.2);
      border-radius: 12px;
      font-family: var(--font-paragrafos);
      transition: all 0.3s ease;
    }

    #pixEmail:focus {
      outline: none;
      border-color: var(--rosa-protagonista);
      box-shadow: 0 0 0 3px rgba(232, 58, 109, 0.1);
    }

    #pixEmail.invalid {
      border-color: #ef4444;
    }

    #pixEmail.valid {
      border-color: #10b981;
    }

    small {
      font-size: 0.7rem;
      color: var(--marrom-claro);
      display: block;
      margin-top: 0.25rem;
    }

    .mp-card-field.valid {
      border-color: #10b981;
    }

    .mp-card-field.invalid {
      border-color: #ef4444;
    }

    .cardholder-name-input,
    .cpf-input {
      width: 100%;
      padding: 0.75rem;
      border: 1.5px solid rgba(58, 42, 31, 0.2);
      border-radius: 12px;
      font-family: var(--font-paragrafos);
      transition: all 0.3s ease;
    }

    .cardholder-name-input:focus,
    .cpf-input:focus {
      outline: none;
      border-color: var(--rosa-protagonista);
      box-shadow: 0 0 0 3px rgba(232, 58, 109, 0.1);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--marrom-base);
    }

    .form-group input,
    .form-group iframe {
      width: 100%;
      height: 48px;
      padding: 0.75rem;
      border: 1.5px solid rgba(58, 42, 31, 0.2);
      border-radius: 12px;
      font-family: var(--font-paragrafos);
      background-color: var(--branco);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--rosa-protagonista);
      box-shadow: 0 0 0 3px rgba(232, 58, 109, 0.1);
    }

    .form-group input.invalid {
      border-color: #ef4444;
    }

    .form-group input.valid {
      border-color: #10b981;
    }

    .form-group input::placeholder {
      color: rgba(58, 42, 31, 0.3);
      font-size: 0.85rem;
    }

    .form-select {
      width: 100%;
      height: 48px;
      padding: 0.75rem;
      border: 1.5px solid rgba(58, 42, 31, 0.2);
      border-radius: 12px;
      font-family: var(--font-paragrafos);
      background: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .form-select:focus {
      outline: none;
      border-color: var(--rosa-protagonista);
      box-shadow: 0 0 0 3px rgba(232, 58, 109, 0.1);
    }

    .email-input {
      width: 100%;
      padding: 0.75rem;
      border: 1.5px solid rgba(58, 42, 31, 0.2);
      border-radius: 12px;
      font-family: var(--font-paragrafos);
      transition: all 0.3s ease;
    }

    .email-input:focus {
      outline: none;
      border-color: var(--rosa-protagonista);
      box-shadow: 0 0 0 3px rgba(232, 58, 109, 0.1);
    }

    .btn-pagar {
      width: 100%;
      padding: 1rem;
      background: var(--rosa-protagonista);
      color: var(--branco);
      border: none;
      border-radius: 99px;
      font-family: var(--font-paragrafos);
      font-weight: 500;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.3s ease;
    }

    .btn-pagar:hover {
      background: var(--terracota);
      transform: translateY(-2px);
    }

    .qr-code {
      text-align: center;
      padding: 1rem;
    }

    .qr-code img {
      margin: 0 auto;
      width: 200px;
      height: 200px;
    }

    .pix-code {
      background: rgba(58, 42, 31, 0.05);
      padding: 0.75rem;
      border-radius: 12px;
      font-family: monospace;
      word-break: break-all;
      margin: 1rem 0;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--marrom-base);
      color: var(--branco);
      padding: 1rem 1.5rem;
      border-radius: 12px;
      z-index: 1001;
      animation: slideIn 0.3s ease;
    }

    .toast.success {
      background: #10b981;
    }

    .toast.error {
      background: #ef4444;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* FOOTER */
    .footer {
      padding: 2rem 0 2.5rem;
      background: var(--creme-suavidade);
      text-align: center;
      border-top: 1px solid rgba(58, 42, 31, 0.07);
    }

    .footer__names {
      display: block;
      width: 100%;
      max-width: 1921px;
      margin: 0 auto;
      margin-bottom: 0.4rem;
    }

    .footer__names img {
      width: 100%;
      height: auto;
      max-width: 240px;
      display: inline-block;
    }

    .footer__date {
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--rosa-protagonista);
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .nav__links {
        display: none;
      }

      .nav__links.open {
        display: flex;
        flex-direction: column;
        gap: 1.8rem;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--creme-suavidade);
        justify-content: center;
        align-items: center;
        z-index: 99;
        width: 100vw;
        height: 100vh;
      }

      .nav__links.open a {
        color: var(--laranja-energia);
        font-size: 1.1rem;
      }

      .nav__links.open a:hover {
        color: var(--laranja-energia);
      }

      .nav__links.open a::after {
        background: var(--laranja-energia);
      }

      .nav__toggle {
        display: flex;
        z-index: 101;
      }

      .nav__links.open~.nav__toggle span {
        background: var(--laranja-energia) !important;
      }

      .nav__logo-image {
        height: 38px;
      }

      /* Detalhe Card Responsivo */
      .detalhe-card {
        grid-template-columns: 1fr;
        border-radius: 20px;
      }

      .detalhe-imagem {
        min-height: 300px;
      }

      .detalhe-imagem img {
        max-height: 300px;
      }

      .detalhe-placeholder {
        font-size: 5rem;
      }

      .detalhe-info {
        padding: 1.5rem;
        gap: 1rem;
      }

      .detalhe-info h1 {
        font-size: clamp(1.5rem, 5vw, 2rem);
      }

      .detalhe-preco span {
        font-size: 1.5rem;
      }

      .detalhe-preco {
        padding: 0.875rem 1rem;
      }

      .detalhe-especificacoes h3 {
        font-size: 1.1rem;
      }

      .detalhe-especificacoes li {
        font-size: 0.85rem;
      }

      .btn-presentear {
        padding: 0.875rem 1.5rem;
        font-size: 0.8rem;
      }

      .payment-methods {
        flex-direction: column;
      }

      .modal-content {
        width: 95%;
        max-height: 90vh;
      }

      .modal-header {
        padding: 1rem;
      }

      .modal-header h2 {
        font-size: 1.25rem;
      }

      .modal-body {
        padding: 1rem;
      }
    }

    @media (max-width: 600px) {
      .detalhe-imagem {
        min-height: 250px;
      }

      .detalhe-imagem img {
        max-height: 250px;
      }

      .detalhe-placeholder {
        font-size: 4rem;
      }

      .detalhe-info {
        padding: 1.25rem;
      }

      .detalhe-info h1 {
        font-size: 1.5rem;
      }

      .detalhe-categoria {
        font-size: 0.65rem;
      }

      .detalhe-preco span {
        font-size: 1.3rem;
      }

      .detalhe-preco strong {
        font-size: 0.9rem;
      }

    // MÁSCARA DE CPF/CNPJ
    function applyDocumentMask(input) {
      let value = input.value.replace(/\D/g, '');

      // Verifica se é CNPJ (14 dígitos) ou CPF (11 dígitos)
      if (value.length > 14) value = value.slice(0, 14);

      if (value.length <= 11) {
        // Máscara de CPF: 000.000.000-00
        if (value.length <= 3) input.value = value;
        else if (value.length <= 6) input.value = `${value.slice(0, 3)}.${value.slice(3)}`;
        else if (value.length <= 9) input.value = `${value.slice(0, 3)}.${value.slice(3, 6)}.${value.slice(6)}`;
        else input.value = `${value.slice(0, 3)}.${value.slice(3, 6)}.${value.slice(6, 9)}-${value.slice(9, 11)}`;
      } else {
        // Máscara de CNPJ: 00.000.000/0000-00
        if (value.length <= 2) input.value = value;
        else if (value.length <= 5) input.value = `${value.slice(0, 2)}.${value.slice(2)}`;
        else if (value.length <= 8) input.value = `${value.slice(0, 2)}.${value.slice(2, 5)}.${value.slice(5)}`;
        else if (value.length <= 12) input.value = `${value.slice(0, 2)}.${value.slice(2, 5)}.${value.slice(5, 8)}/${value.slice(8)}`;
        else input.value = `${value.slice(0, 2)}.${value.slice(2, 5)}.${value.slice(5, 8)}/${value.slice(8, 12)}-${value.slice(12, 14)}`;
      }
    }

    function setupDocumentMaskListeners() {
      const creditDocField = document.getElementById("form-checkout__identificationNumber");
      const debitDocField = document.getElementById("debit-form-checkout__identificationNumber");

      if (creditDocField) {
        creditDocField.addEventListener("input", () => applyDocumentMask(creditDocField));
      }
      if (debitDocField) {
        debitDocField.addEventListener("input", () => applyDocumentMask(debitDocField));
      }
    }


    // FUNÇÕES DE SELECT (UTILITÁRIAS)
    function clearHTMLSelectChildrenFrom(element) {
      if (!element) return;
      const currOptions = [...element.children];
      currOptions.forEach((child) => child.remove());
    }

    function createSelectElementPlaceholder(element, placeholder) {
      if (!element) return;
      const optionElement = document.createElement("option");
      optionElement.textContent = placeholder;
      optionElement.setAttribute("selected", "");
      optionElement.setAttribute("disabled", "");
      element.appendChild(optionElement);
    }

    function clearSelectAndSetPlaceholder(element, placeholder) {
      if (!element) return;
      element.innerHTML = "";
      const option = document.createElement("option");
      option.value = "";
      option.disabled = true;
      option.selected = true;
      option.textContent = placeholder;
      element.appendChild(option);
    }

    function createSelectOptions(elem, options, labelsAndKeys = { label: "name", value: "id" }) {
      if (!elem) return;
      const { label, value } = labelsAndKeys;
      const currentValue = elem.value;

      const hasPlaceholder = elem.options.length === 1 && elem.options[0]?.disabled;

      if (hasPlaceholder) {
        elem.innerHTML = "";
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.disabled = true;
        placeholder.selected = true;
        placeholder.textContent = elem.options[0]?.textContent || "Selecione uma opção";
        elem.appendChild(placeholder);
      } else {
        const placeholder = elem.querySelector("option[disabled][selected]");
        elem.innerHTML = "";
        if (placeholder) elem.appendChild(placeholder.cloneNode(true));
      }

      options.forEach((option) => {
        const optValue = option[value];
        const optLabel = option[label];
        const opt = document.createElement("option");
        opt.value = optValue;
        opt.textContent = optLabel;
        if (currentValue && optValue == currentValue) opt.selected = true;
        elem.appendChild(opt);
      });
    }


    // API CALLS PARA MERCADO PAGO
    async function initMercadoPago() {
      if (mp) return mp;
      if (typeof MercadoPago !== "undefined") {
        mp = new MercadoPago("APP_USR-d5bd182c-263e-4093-852f-cc78b81a6123");
        return mp;
      }
      return new Promise((resolve) => {
        const check = setInterval(() => {
          if (typeof MercadoPago !== "undefined") {
            clearInterval(check);
            mp = new MercadoPago("APP_USR-d5bd182c-263e-4093-852f-cc78b81a6123");

          }
        }, 100);

    async function getIdentificationTypes() {
      try {
        await initMercadoPago();
        const identificationTypesList = await mp.getIdentificationTypes();
        identificationTypes = identificationTypesList;

        const creditSelect = document.getElementById("form-checkout__identificationType");

    async function getIssuers(paymentMethodId, bin) {
      try {

        // Valida os parâmetros
        if (!paymentMethodId || !bin) {
          console.error("Parâmetros inválidos:", { paymentMethodId, bin });
          return [];
        }

        // Usa o SDK do Mercado Pago diretamente (sem chamar o backend)
        const issuers = await mp.getIssuers({
          paymentMethodId: paymentMethodId,
          bin: bin
        });

        // Verifica se retornou dados válidos
        if (issuers && Array.isArray(issuers) && issuers.length > 0) {
          // Mapeia para o formato esperado pelo createSelectOptions
          return issuers.map(issuer => ({
            id: issuer.id,
            name: issuer.name
          }));
        }

        return [];
      } catch (e) {
        console.error("Erro ao buscar issuers com SDK:", e);
        return [];
      }
    }

    async function getInstallments(amount, bin, paymentMethodId) {
      try {
        // Valida se amount é válido (pode ser string ou número)
        if (!amount || amount === '') {
          console.error("Amount não fornecido");
          return [];
        }

        // Converte para string e limpa a formatação
        let amountStr = String(amount).trim();
        // Remove "R$" e espaços, troca vírgula por ponto
        amountStr = amountStr.replace(/[R$\s]/g, '').replace(',', '.');

        // Valida se é um número válido
        const amountNumber = parseFloat(amountStr);
        if (isNaN(amountNumber) || amountNumber <= 0) {
          console.error("Amount inválido após conversão:", amount);
          return [];
        }

        const response = await mp.getInstallments({
          amount: amountStr,
          bin: bin,
          paymentTypeId: 'credit_card'
        });

        // Extrai as opções de parcelamento
        if (response && response.length > 0) {
          // Filtra pelo payment_method_id se necessário
          let installmentsInfo = response[0];
          if (paymentMethodId) {
            const found = response.find(item => item.payment_method_id === paymentMethodId);
            if (found) installmentsInfo = found;
          }

          if (installmentsInfo && installmentsInfo.payer_costs && installmentsInfo.payer_costs.length > 0) {
            return installmentsInfo.payer_costs;
          } else {

          }
        } else {

        }

        return [];
      } catch (e) {
        console.error("Erro ao buscar parcelas com SDK:", e);
        return [];
      }
    }

    let debounceTimeout = null;

    async function setupCardBinListener(cardNumberElement, type = "credit") {
      if (!cardNumberElement) return;

      const issuerElementId = type === "credit" ? "form-checkout__issuer" : "debit-form-checkout__issuer";
      const installmentsElementId = type === "credit" ? "form-checkout__installments" : "debit-form-checkout__installments";
      const paymentMethodIdInputId = type === "credit" ? "paymentMethodId" : "debit-paymentMethodId";

      const issuerElement = document.getElementById(issuerElementId);
      const installmentsElement = document.getElementById(installmentsElementId);
      const paymentMethodIdInput = document.getElementById(paymentMethodIdInputId);

      cardNumberElement.on("binChange", async (data) => {
        const { bin } = data;

        // Debounce para evitar múltiplas chamadas
        if (debounceTimeout) clearTimeout(debounceTimeout);

        debounceTimeout = setTimeout(async () => {
          try {

            if (!bin || bin.length < 6) {
              if (issuerElement) clearSelectAndSetPlaceholder(issuerElement, "Selecione o banco");
              if (installmentsElement) clearSelectAndSetPlaceholder(installmentsElement, "Selecione as parcelas");
              if (paymentMethodIdInput) paymentMethodIdInput.value = "";
              currentBin = null;
              return;
            }

            if (bin !== currentBin) {
              // Busca informações do método de pagamento baseado no bin
              const { results } = await mp.getPaymentMethods({ bin });
              const paymentMethod = results[0];

              if (paymentMethod) {
                // Atualiza o input hidden com o ID do método de pagamento
                if (paymentMethodIdInput) {
                  paymentMethodIdInput.value = paymentMethod.id;
                }

                // Atualiza as configurações dos campos (validações)
                updatePCIFieldsSettings(paymentMethod, cardNumberElement,
                  type === "credit" ? creditCardFields?.securityCode : debitCardFields?.securityCode);

                // Para cartão de CRÉDITO apenas
                if (type === "credit") {
                  const issuers = await getIssuers(paymentMethod.id, bin);

                  if (issuerElement) {
                    if (issuers.length > 0) {
                      createSelectOptions(issuerElement, issuers, { label: "name", value: "id" });
                    } else {
                      clearSelectAndSetPlaceholder(issuerElement, "Banco emissor (não disponível)");
                    }
                  }

                  // 2. Buscar parcelas
                  const amount = currentPresente?.preco || 100;

                  // Limpa o amount: remove "R$", espaços, e converte vírgula para ponto
                  let cleanAmount = amount;
                  if (typeof cleanAmount === 'string') {
                    cleanAmount = cleanAmount.replace(/[R$\s]/g, '').replace(',', '.');
                  }
                  cleanAmount = parseFloat(cleanAmount);

                  // Chama getInstallments com o parâmetro correto (amount como string)
                  const installmentOptions = await getInstallments(String(cleanAmount), bin, paymentMethod.id);

                  if (installmentsElement) {
                    if (installmentOptions.length > 0) {
                      createSelectOptions(installmentsElement, installmentOptions, {
                        label: "recommended_message",
                        value: "installments"
                      });
                    } else {
                      clearSelectAndSetPlaceholder(installmentsElement, "Selecione as parcelas");

                      // Fallback: Adiciona opção de parcela única se não houver parcelas
                      const amountNumber = cleanAmount;
                      if (!isNaN(amountNumber) && amountNumber > 0) {
                        const fallbackOption = [{
                          installments: 1,
                          recommended_message: `1x de R$ ${amountNumber.toFixed(2)} sem juros`,
                          total_amount: amountNumber
                        }];
                        createSelectOptions(installmentsElement, fallbackOption, {
                          label: "recommended_message",
                          value: "installments"
                        });
                      }
                    }
                  }
                }
              }

              currentBin = bin;
            }
          } catch (e) {
            console.error("error in binChange: ", e);
          }
        }, 500); // Aguarda 500ms após o último dígito
      });
    }

    function updatePCIFieldsSettings(paymentMethod, cardNumberElement, securityCodeElement) {
      if (!paymentMethod?.settings?.[0]) return;
      const { settings } = paymentMethod;
      const cardNumberSettings = settings[0]?.card_number;
      const securityCodeSettings = settings[0]?.security_code;
      if (cardNumberSettings && cardNumberElement) cardNumberElement.update({ settings: cardNumberSettings });
      if (securityCodeSettings && securityCodeElement) securityCodeElement.update({ settings: securityCodeSettings });
    }

    // INICIALIZAÇÃO DOS CAMPOS DE CARTÃO
    async function initCreditCardFields() {
      await initMercadoPago();
      await getIdentificationTypes();

      if (creditCardFields) {
        try {
          creditCardFields.cardNumber?.unmount();
          creditCardFields.expirationDate?.unmount();
          creditCardFields.securityCode?.unmount();
        } catch (e) { }
        creditCardFields = null;
      }

      const cardNumber = mp.fields.create("cardNumber", { placeholder: "Número do cartão" }).mount("form-checkout__cardNumber");
      const expirationDate = mp.fields.create("expirationDate", { placeholder: "MM/YY" }).mount("form-checkout__expirationDate");
      const securityCode = mp.fields.create("securityCode", { placeholder: "Código de segurança" }).mount("form-checkout__securityCode");

      creditCardFields = { cardNumber, expirationDate, securityCode };
      await setupCardBinListener(cardNumber, "credit");
    }

    async function initDebitCardFields() {
      await initMercadoPago();
      await getIdentificationTypes();

      if (debitCardFields) {
        try {
          debitCardFields.cardNumber?.unmount();
          debitCardFields.expirationDate?.unmount();
          debitCardFields.securityCode?.unmount();
        } catch (e) { }
        debitCardFields = null;
      }

      const cardNumber = mp.fields.create("cardNumber", { placeholder: "Número do cartão" }).mount("debit-form-checkout__cardNumber");
      const expirationDate = mp.fields.create("expirationDate", { placeholder: "MM/YY" }).mount("debit-form-checkout__expirationDate");
      const securityCode = mp.fields.create("securityCode", { placeholder: "Código de segurança" }).mount("debit-form-checkout__securityCode");

      debitCardFields = { cardNumber, expirationDate, securityCode };
      await setupCardBinListener(cardNumber, "debit");
    }

    function unmountCardFields() {
      if (creditCardFields) {
        try {
          creditCardFields.cardNumber?.unmount();
          creditCardFields.expirationDate?.unmount();
          creditCardFields.securityCode?.unmount();
        } catch (e) { }
        creditCardFields = null;
      }
      if (debitCardFields) {
        try {
          debitCardFields.cardNumber?.unmount();
          debitCardFields.expirationDate?.unmount();
          debitCardFields.securityCode?.unmount();
        } catch (e) { }
        debitCardFields = null;
      }
    }


    // PROCESSAMENTO DE PAGAMENTOS
    async function processCreditPayment() {
      const cardholderName = document.getElementById("form-checkout__cardholderName").value;
      const identificationType = document.getElementById("form-checkout__identificationType").value;
      const identificationNumberRaw = document.getElementById("form-checkout__identificationNumber").value;
      const identificationNumber = identificationNumberRaw.replace(/\D/g, "");
      const email = document.getElementById("form-checkout__email").value;
      const issuerId = document.getElementById("form-checkout__issuer")?.value;
      const installments = parseInt(document.getElementById("form-checkout__installments")?.value || "1");

      if (!cardholderName) { showToast("Preencha o nome do titular do cartão", "error"); return; }
      if (!identificationType || identificationType === "") { showToast("Selecione o tipo de documento", "error"); return; }
      if (!identificationNumber || identificationNumber.length < 11) { showToast("Número de documento inválido", "error"); return; }
      if (!email || !email.includes("@")) { showToast("Preencha um e-mail válido", "error"); return; }
      if (installments > 1 && !issuerId) { showToast("Selecione o banco emissor para parcelamento", "error"); return; }
      if (!creditCardFields) { showToast("Sistema de pagamento não inicializado. Tente novamente.", "error"); return; }

      showToast("Processando pagamento...", "info");

      try {
        const cardToken = await mp.fields.createCardToken({
          cardholderName: cardholderName,
          identificationType: identificationType,
          identificationNumber: identificationNumber,
        });

        let cardBrand = "visa";
        try {
          const cardInfo = await mp.fields.getCardInfo();
          cardBrand = cardInfo.cardNumber?.paymentMethod?.id || "visa";
        } catch (e) { }

        const paymentMethodId = cardBrand === "visa" ? "visa" : cardBrand === "master" ? "master" : cardBrand === "amex" ? "amex" : "visa";

        const response = await fetch(`${API_BASE}/create-card-payment`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            amount: currentPresente.preco,
            description: currentPresente.nome,
            token: cardToken.id,
            paymentMethodId: paymentMethodId,
            installments: installments,
            issuerId: issuerId || undefined,
            identificationType: identificationType,
            identificationNumber: identificationNumber,
            payerEmail: email,
            cardBrand: cardBrand,
            paymentType: "credit",
          }),
        });

        const data = await response.json();

        if (data.success && data.status === "approved") {
          showToast("Pagamento aprovado! Obrigado por presentear!", "success");
          setTimeout(() => { closeModal(); window.location.reload(); }, 2000);
        } else if (data.status === "in_process") {
          showToast("Pagamento em processamento. Aguarde...", "info");
          startPaymentPolling(data.paymentId);
        } else {
          throw new Error(data.statusDetail || data.error || "Pagamento não aprovado");
        }
      } catch (error) {
        console.error("Erro detalhado:", error);
        showToast(`${error.message}`, "error");
      }
    }

    async function processDebitPayment() {
      const cardholderName = document.getElementById("debit-form-checkout__cardholderName").value;
      const identificationType = document.getElementById("debit-form-checkout__identificationType").value;
      const identificationNumberRaw = document.getElementById("debit-form-checkout__identificationNumber").value;
      const identificationNumber = identificationNumberRaw.replace(/\D/g, "");
      const email = document.getElementById("debit-form-checkout__email").value;

      if (!cardholderName) { showToast("Preencha o nome do titular do cartão", "error"); return; }
      if (!identificationType || identificationType === "") { showToast("Selecione o tipo de documento", "error"); return; }
      if (!identificationNumber || identificationNumber.length < 11) { showToast("Número de documento inválido", "error"); return; }
      if (!email || !email.includes("@")) { showToast("Preencha um e-mail válido", "error"); return; }
      if (!debitCardFields) { showToast("Sistema de pagamento não inicializado. Tente novamente.", "error"); return; }

      showToast("Processando pagamento...", "info");

      try {
        const cardToken = await mp.fields.createCardToken({
          cardholderName: cardholderName,
          identificationType: identificationType,
          identificationNumber: identificationNumber,
        });

        let cardBrand = "visa";
        try {
          const cardInfo = await mp.fields.getCardInfo();
          cardBrand = cardInfo.cardNumber?.paymentMethod?.id || "visa";
        } catch (e) { }

        const paymentMethodId = cardBrand === "visa" ? "visa_debit" : cardBrand === "master" ? "master_debit" : "visa_debit";

        const response = await fetch(`${API_BASE}/create-card-payment`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            amount: currentPresente.preco,
            description: currentPresente.nome,
            token: cardToken.id,
            paymentMethodId: paymentMethodId,
            installments: 1,
            identificationType: identificationType,
            identificationNumber: identificationNumber,
            payerEmail: email,
            cardBrand: cardBrand,
            paymentType: "debit",
          }),
        });

        const data = await response.json();

        if (data.success && data.status === "approved") {
          showToast("Pagamento aprovado! Obrigado por presentear!", "success");
          setTimeout(() => { closeModal(); window.location.reload(); }, 2000);
        } else {
          throw new Error(data.statusDetail || data.error || "Pagamento não aprovado");
        }
      } catch (error) {
        console.error("Erro no pagamento débito:", error);
        showToast(`Erro: ${error.message}`, "error");
      }
    }

    // PIX E POLLING
    async function generatePixQRCode() {
      // Valida o email antes de prosseguir
      const pixEmailInput = document.getElementById("pixEmail");
      const pixEmail = pixEmailInput ? pixEmailInput.value.trim() : "";

      // Validação do email
      if (!pixEmail) {
        showToast("Por favor, informe seu e-mail para gerar o PIX", "error");
        pixEmailInput?.focus();
        return;
      }

      if (!isValidEmail(pixEmail)) {
        showToast("Por favor, informe um e-mail válido", "error");
        pixEmailInput?.focus();
        return;
      }

      const pixPlaceholder = document.getElementById("pixPlaceholder");
      const pixGeneratedContent = document.getElementById("pixGeneratedContent");
      const qrContainer = document.getElementById("qrCodeContainer");
      const pixCodeElement = document.getElementById("pixCode");

      if (pixPlaceholder) pixPlaceholder.style.display = "none";
      if (pixGeneratedContent) pixGeneratedContent.style.display = "block";
      qrContainer.innerHTML = "<p>Gerando QR Code PIX...</p>";
      pixCodeElement.innerHTML = "";

      try {
        const response = await fetch(`${API_BASE}/create-payment`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            amount: currentPresente.preco,
            description: currentPresente.nome,
            payerEmail: pixEmail,
            payerName: "Convidado",
            presenteId: currentPresente.id,
          }),
        });

        const data = await response.json();

        if (data.success) {
          if (data.qrCodeBase64) {
            qrContainer.innerHTML = `<img src="data:image/jpeg;base64,${data.qrCodeBase64}" alt="QR Code PIX" style="width: 200px; height: 200px; margin: 0 auto;"><p style="margin-top: 1rem; font-size: 0.85rem;">Escaneie o QR Code com seu banco</p>`;
          } else if (data.qrCode) {
            qrContainer.innerHTML = `<div style="background: #000; padding: 1rem; border-radius: 12px;"><img src="https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=${encodeURIComponent(data.qrCode)}" alt="QR Code PIX" style="width: 200px; height: 200px;"></div><p style="margin-top: 1rem; font-size: 0.85rem;">Escaneie o QR Code com seu banco</p>`;
          }
          pixCodeElement.textContent = data.pixCode || data.qrCode;
          startPaymentPolling(data.paymentId);
          showToast("PIX gerado! Escaneie o QR Code para pagar", "success");
        } else {
          throw new Error(data.error || "Erro ao gerar PIX");
        }
      } catch (error) {
        console.error("Erro ao gerar PIX:", error);
        qrContainer.innerHTML = `<p style="color: red;">Erro ao gerar PIX</p><p style="font-size: 0.85rem;">${error.message}</p><button onclick="generatePixQRCode()" style="margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; background: var(--rosa-protagonista); color: white; border: none; border-radius: 8px;">Tentar novamente</button>`;
        showToast("Erro ao gerar pagamento PIX. Tente novamente.", "error");

        // Se houve erro, mostra o placeholder novamente
        if (pixPlaceholder) pixPlaceholder.style.display = "block";
        if (pixGeneratedContent) pixGeneratedContent.style.display = "none";
      }
    }

    // Função auxiliar para validar email
    function isValidEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }

    function startPaymentPolling(paymentId) {
      if (pollingInterval) clearInterval(pollingInterval);
      let attempts = 0;
      const maxAttempts = 60;

      pollingInterval = setInterval(async () => {
        attempts++;
        try {
          const response = await fetch(`${API_BASE}/check-payment?id=${paymentId}`);
          const data = await response.json();

          if (data.success) {
            if (data.status === "approved") {
              clearInterval(pollingInterval);
              pollingInterval = null;
              showToast("Pagamento confirmado! Obrigado por presentear!", "success");
              closeModal();
              setTimeout(() => window.location.reload(), 2000);
            } else if (data.status === "rejected") {
              clearInterval(pollingInterval);
              pollingInterval = null;
              showToast("Pagamento recusado. Tente novamente.", "error");
            }
          }
          if (attempts >= maxAttempts) {
            clearInterval(pollingInterval);
            pollingInterval = null;
          }
        } catch (error) {
          console.error("Erro ao verificar status:", error);
        }
      }, 5000);
    }

    function copyPixCode() {
      const pixCode = document.getElementById("pixCode").textContent;
      if (pixCode) {
        navigator.clipboard.writeText(pixCode);
        showToast("Código PIX copiado!", "success");
      } else {
        showToast("Nenhum código PIX disponível", "error");
      }
    }

    function openModal() {
      const modal = document.getElementById("paymentModal");
      modal.classList.add("active");

      const pixPlaceholder = document.getElementById("pixPlaceholder");
      const pixGeneratedContent = document.getElementById("pixGeneratedContent");
      if (pixPlaceholder && pixGeneratedContent) {
        pixPlaceholder.style.display = "block";
        pixGeneratedContent.style.display = "none";
      }

      const activeMethod = document.querySelector(".payment-btn.active")?.dataset.method || "pix";

      if (activeMethod === "credit") {
        setTimeout(() => initCreditCardFields(), 100);
      } else if (activeMethod === "debit") {
        setTimeout(() => initDebitCardFields(), 100);
      }
    }

    function closeModal() {
      const modal = document.getElementById("paymentModal");
      modal.classList.remove("active");

      setTimeout(() => {
        unmountCardFields();
      }, 300);

      if (pollingInterval) {
        clearInterval(pollingInterval);
        pollingInterval = null;
      }
    }

    function setupPaymentMethodSwitch() {
      document.querySelectorAll(".payment-btn").forEach((btn) => {
        btn.removeEventListener("click", btn._handler);

        const handler = async () => {
          const method = btn.dataset.method;

          document.querySelectorAll(".payment-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");

          document.querySelectorAll(".payment-content").forEach((c) => c.classList.remove("active"));
          document.getElementById(`${method}Content`).classList.add("active");

          // Limpa campos existentes
          unmountCardFields();

          // Inicializa novos campos
          if (method === "credit") {
            await initCreditCardFields();
            setupDocumentMaskListeners();
          } else if (method === "debit") {
            await initDebitCardFields();
            setupDocumentMaskListeners();
          } else if (method === "pix") {
            const pixPlaceholder = document.getElementById("pixPlaceholder");
            const pixGeneratedContent = document.getElementById("pixGeneratedContent");
            if (pixPlaceholder && pixGeneratedContent) {
              pixPlaceholder.style.display = "block";
              pixGeneratedContent.style.display = "none";
            }
          }
        };

        btn._handler = handler;
        btn.addEventListener("click", handler);
      });
    }

    // RENDERIZAÇÃO DO DETALHE DO PRESENTE
    async function carregarDetalhePresente() {
      const id = getIdFromURL();
      if (!id) {
        mostrarErro("ID do presente não informado.");
        return;
      }
      try {
        const response = await fetch("/data/presentes.json");
        if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        const data = await response.json();
        const presente = data.presentes.find((p) => p.id === parseInt(id));
        if (!presente) {
          mostrarErro("Presente não encontrado.");
          return;
        }
        currentPresente = presente;
        renderizarDetalhe(presente);
      } catch (error) {
        console.error("Erro:", error);
        mostrarErro(`Erro ao carregar detalhes do presente. Detalhe: ${error.message}`);
      }
    }

    function renderizarDetalhe(presente) {
      const container = document.getElementById("detalheContent");
      const statusInfo = {
        priority: { class: "ribbon--priority", text: "Prioritário" },
        available: { class: "ribbon--available", text: "Disponível" },
        gifted: { class: "ribbon--gifted", text: "Presenteado ♡" },
      }[presente.status] || { class: "ribbon--available", text: "Disponível" };

      const precoFormatado = presente.preco.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const hasExternalLink = presente.linkExterno && presente.linkExterno.trim() !== "";

      // Função para lidar com o clique no botão "Ver na loja"
      const handleVerNaLoja = () => {
        if (presente.linkExterno) {
          abrirWhatsapp(presente.linkExterno, presente.nome);
        }
      };

      const html = `
          <article class="detalhe-card">
            <div class="detalhe-imagem">
              ${presente.imagem ? `<img src="${escapeHTML(presente.imagem)}" alt="${escapeHTML(presente.nome)}">` : `<div class="detalhe-placeholder" aria-hidden="true">${presente.icone || "🎁"}</div>`}
            </div>
            <div class="detalhe-info">
              <span class="detalhe-categoria">${capitalizar(presente.categoria)}</span>
              <h1>${escapeHTML(presente.nome)}</h1>
              <span class="detalhe-ribbon ${statusInfo.class}">${statusInfo.text}</span>
              <p class="detalhe-descricao">${escapeHTML(presente.descricao)}</p>
              <div class="detalhe-preco"><strong>Valor:</strong> <span>R$ ${precoFormatado}</span></div>
              ${presente.detalhes && presente.detalhes.length > 0 ? `
                <div class="detalhe-especificacoes">
                  <h3>Detalhes do produto</h3>
                  <ul>${presente.detalhes.map((d) => `<li>${escapeHTML(d)}</li>`).join("")}</ul>
                </div>
              ` : ""}
              <div class="detalhe-endereco">
                <div class="endereco-header">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                  </svg>
                  <h3>Endereço para entrega</h3>
                </div>
                <div class="endereco-conteudo">
                  <p>Rua Duque de Caxias, 815</p>
                  <p>Olímpia - SP</p>
                  <p>CEP: 15402-072</p>
                  <button class="btn-copiar-endereco-mini" onclick="copiarEndereco()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    Copiar endereço
                  </button>
                </div>
              </div>
              <div class="detalhe-acoes">
                <div class="btn-group">
                  ${hasExternalLink ? `<a href="#" onclick="abrirWhatsapp('${escapeHTML(presente.linkExterno)}', '${escapeHTML(presente.nome)}'); return false;" class="btn-externo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Ver na loja</a>` : ""}
                  ${presente.status !== "gifted" ? `<button class="btn-presentear" data-id="${presente.id}" onclick="openModal()">Presentear com o valor</button>` : `<p class="mensagem-gifted">Este presente já foi adquirido por um convidado especial!</p>`}
                </div>
              </div>
            </div>
          </article>
        `;
      container.innerHTML = html;
      
      // Registra a função globalmente para ser chamada pelo onclick
      window.abrirWhatsapp = abrirWhatsapp;
    }

    // INICIALIZAÇÃO
    document.addEventListener("DOMContentLoaded", async () => {
      setupPaymentMethodSwitch();
      carregarDetalhePresente();
      setupDocumentMaskListeners();

      const creditButton = document.getElementById("creditPaymentButton");
      const debitButton = document.getElementById("debitPaymentButton");

      if (creditButton) creditButton.addEventListener("click", processCreditPayment);
      if (debitButton) debitButton.addEventListener("click", processDebitPayment);
    });

    window.onclick = function (event) {
      const modal = document.getElementById("paymentModal");
      if (event.target === modal) closeModal();
    };
  </script>
</body>
