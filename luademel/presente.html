<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="../img/logo_laranja.png" type="image/x-icon" />
    <title>Detalhe da Experiência - Lua de Mel | Giovanna & Erick</title>

    <!-- Mercado Pago SDK Produção -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @font-face {
            font-family: "Oleragie";
            src: url("../fonts/Oleragie.otf") format("opentype");
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: "Satoshi";
            src: url("../fonts/Satoshi-Variable.ttf") format("truetype");
            font-weight: 300 900;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --rosa-protagonista: #e83a6d;
            --laranja-energia: #ed4b14;
            --amarelo-alegria: #feb423;
            --creme-suavidade: #fee3b4;
            --marrom-base: #3a2a1f;
            --marrom-claro: #5e4130;
            --terracota: #d96c2b;
            --branco: #ffffff;
            --verde-sucesso: #10b981;

            --font-titulos: "Oleragie", "Playfair Display", Georgia, "Times New Roman", serif;
            --font-paragrafos: "Satoshi", "Jost", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --section-pad: clamp(4rem, 8vw, 7rem);
        }

        body {
            background: var(--creme-suavidade);
            color: var(--marrom-base);
            font-family: var(--font-paragrafos);
            font-weight: 300;
            line-height: 1.75;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .container {
            width: min(1200px, 92%);
            margin-inline: auto;
        }

        /* Navbar */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 1.25rem 0;
            background: var(--laranja-energia);
            backdrop-filter: blur(14px);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .nav__inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav__logo {
            display: block;
            line-height: 0;
        }

        .nav__logo-image {
            height: 45px;
            width: auto;
            display: block;
            transition: transform 0.3s ease;
            filter: brightness(0) invert(1);
        }

        .nav__logo-image:hover {
            transform: scale(1.02);
        }

        .nav__links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav__links a {
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 500;
            font-family: var(--font-paragrafos);
            color: var(--branco);
            transition: color 0.2s;
            position: relative;
            padding-bottom: 4px;
        }

        .nav__links a:hover,
        .nav__links a.active {
            color: var(--amarelo-alegria);
        }

        .nav__links a::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--amarelo-alegria);
            transition: width 0.3s ease;
        }

        .nav__links a:hover::after {
            width: 100%;
        }

        .nav__toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
        }

        .nav__toggle span {
            display: block;
            width: 24px;
            height: 1.5px;
            background: var(--branco);
            transition: transform 0.3s, opacity 0.3s;
        }

        .nav__links.open~.nav__toggle span {
            background: var(--laranja-energia) !important;
        }

        /* Detalhe da Experiência */
        .presente-detalhe {
            min-height: 80vh;
            padding: 8rem 0 3rem;
            position: relative;
        }

        .detalhe-card {
            background: var(--branco);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(58, 42, 31, 0.08);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .detalhe-imagem {
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fef5d3 0%, #fde4a0 100%);
        }

        .detalhe-imagem img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detalhe-placeholder {
            font-size: 6rem;
            opacity: 0.7;
        }

        .detalhe-info {
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .detalhe-categoria {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--terracota);
            font-weight: 500;
            display: inline-block;
        }

        .detalhe-info h1 {
            font-family: var(--font-paragrafos);
            font-size: 2rem;
            line-height: 1.2;
            font-weight: 600;
            color: var(--marrom-base);
        }

        .detalhe-ribbon {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0.35rem 1rem;
            border-radius: 99px;
            width: fit-content;
        }

        .ribbon--priority {
            background: var(--laranja-energia);
            color: var(--branco);
        }

        .ribbon--available {
            background: rgba(254, 180, 35, 0.2);
            color: #8a6800;
        }

        .detalhe-preco {
            background: linear-gradient(135deg, rgba(232, 58, 109, 0.05) 0%, rgba(254, 180, 35, 0.05) 100%);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .detalhe-preco strong {
            font-weight: 600;
            color: var(--marrom-base);
        }

        .detalhe-preco span {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--rosa-protagonista);
        }

        .valor-livre-badge {
            background: var(--amarelo-alegria);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-left: 0.5rem;
        }

        .detalhe-descricao {
            color: var(--marrom-claro);
            line-height: 1.6;
            font-size: 1rem;
        }

        .detalhe-especificacoes {
            margin-top: 0.5rem;
        }

        .detalhe-especificacoes h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--marrom-base);
        }

        .detalhe-especificacoes ul {
            list-style: none;
            padding-left: 1rem;
        }

        .detalhe-especificacoes li {
            margin-bottom: 0.5rem;
            position: relative;
            font-size: 0.9rem;
            color: var(--marrom-claro);
        }

        .detalhe-especificacoes li::before {
            content: "✦";
            color: var(--rosa-protagonista);
            position: absolute;
            left: -1rem;
        }

        .valor-livre-input {
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(254, 180, 35, 0.08);
            border-radius: 16px;
            border: 1px solid rgba(232, 58, 109, 0.2);
        }

        .valor-livre-input label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--marrom-base);
        }

        .valor-livre-input input {
            width: 100%;
            padding: 0.875rem;
            border: 1.5px solid rgba(58, 42, 31, 0.2);
            border-radius: 12px;
            font-family: var(--font-paragrafos);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .valor-livre-input input:focus {
            outline: none;
            border-color: var(--rosa-protagonista);
            box-shadow: 0 0 0 3px rgba(232, 58, 109, 0.1);
        }

        .detalhe-acoes {
            margin-top: 0.5rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-group>* {
            flex: 1;
            min-width: 180px;
        }

        .btn-externo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: transparent;
            border: 2px solid var(--marrom-claro);
            color: var(--marrom-claro);
            padding: 1rem 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: 99px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-externo:hover {
            background: var(--marrom-claro);
            color: var(--branco);
            transform: translateY(-2px);
        }

        .btn-presentear {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: var(--rosa-protagonista);
            color: var(--branco);
            border: none;
            padding: 1rem 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: 99px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-presentear:hover {
            background: var(--terracota);
            transform: translateY(-2px);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--creme-suavidade);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(58, 42, 31, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-family: var(--font-titulos);
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--marrom-base);
            margin-top: 0.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--marrom-claro);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .payment-methods {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .payment-btn {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            border: 1.5px solid rgba(58, 42, 31, 0.2);
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--font-paragrafos);
            transition: all 0.3s ease;
        }

        .payment-btn.active {
            border-color: var(--rosa-protagonista);
            background: rgba(232, 58, 109, 0.1);
            color: var(--rosa-protagonista);
        }

        .payment-content {
            display: none;
        }

        .payment-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--marrom-base);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1.5px solid rgba(58, 42, 31, 0.2);
            border-radius: 12px;
            font-family: var(--font-paragrafos);
            background: white;
        }

        .mp-card-field {
            width: 100%;
            height: 48px;
            padding: 0.75rem;
            border: 1.5px solid rgba(58, 42, 31, 0.2);
            border-radius: 12px;
            background: white;
        }

        .btn-pagar {
            width: 100%;
            padding: 1rem;
            background: var(--rosa-protagonista);
            color: var(--branco);
            border: none;
            border-radius: 99px;
            font-family: var(--font-paragrafos);
            font-weight: 500;
            cursor: pointer;
            margin-top: 1rem;
        }

        .qr-code {
            text-align: center;
            padding: 1rem;
        }

        .qr-code img {
            margin: 0 auto;
            width: 200px;
            height: 200px;
        }

        .pix-code {
            background: rgba(58, 42, 31, 0.05);
            padding: 0.75rem;
            border-radius: 12px;
            font-family: monospace;
            word-break: break-all;
            margin: 1rem 0;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--marrom-base);
            color: var(--branco);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            z-index: 1001;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: var(--verde-sucesso);
        }

        .toast.error {
            background: #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .footer {
            padding: 2rem 0 2.5rem;
            background: var(--creme-suavidade);
            text-align: center;
            border-top: 1px solid rgba(58, 42, 31, 0.07);
        }

        .footer__names img {
            max-width: 240px;
            display: inline-block;
        }

        .footer__date {
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--rosa-protagonista);
        }

        @media (max-width: 900px) {
            .detalhe-card {
                grid-template-columns: 1fr;
            }

            .nav__links {
                display: none;
            }

            .nav__links.open {
                display: flex;
                flex-direction: column;
                gap: 1.8rem;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: var(--creme-suavidade);
                justify-content: center;
                align-items: center;
                z-index: 99;
                width: 100vw;
                height: 100vh;
            }

            .nav__links.open a {
                color: var(--laranja-energia);
                font-size: 1.1rem;
            }

            .nav__toggle {
                display: flex;
                z-index: 101;
            }

            .payment-methods {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <nav class="nav" id="nav">
        <div class="container">
            <div class="nav__inner">
                <a href="../" class="nav__logo">
                    <img src="../img/logo_branco.png" alt="Giovanna & Erick" class="nav__logo-image" />
                </a>
                <ul class="nav__links" id="navLinks">
                    <li><a href="../">Início</a></li>
                    <li><a href="../presentes/">Presentes</a></li>
                    <li><a href="../luademel/">Lua de Mel</a></li>
                </ul>
                <button class="nav__toggle" id="navToggle" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="presente-detalhe">
        <div class="container">
            <div id="detalheContent">
                <div class="loading" style="text-align: center; padding: 4rem">
                    <p>Carregando detalhes da experiência...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal de Pagamento -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Contribuir com a experiência</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="payment-methods">
                    <button class="payment-btn active" data-method="pix">PIX</button>
                    <button class="payment-btn" data-method="credit">Cartão de Crédito</button>
                    <button class="payment-btn" data-method="debit">Cartão de Débito</button>
                </div>

                <!-- PIX Content -->
                <div id="pixContent" class="payment-content active">
                    <div id="pixPlaceholder">
                        <div class="form-group">
                            <label for="pixEmail">E-mail para receber a confirmação</label>
                            <input type="email" id="pixEmail" class="email-input" placeholder="seu@email.com"
                                required />
                            <small
                                style="font-size: 0.7rem; color: var(--marrom-claro); display: block; margin-top: 0.25rem;">
                                O comprovante de pagamento será enviado para este e-mail
                            </small>
                        </div>
                        <button class="btn-pagar" onclick="generatePixQRCode()"
                            style="background: var(--rosa-protagonista)">
                            Gerar QR Code PIX
                        </button>
                    </div>

                    <div id="pixGeneratedContent" style="display: none">
                        <div class="qr-code" id="qrCodeContainer"></div>
                        <div class="pix-code" id="pixCode"></div>
                        <button class="btn-pagar" onclick="copyPixCode()">
                            Copiar código PIX
                        </button>
                    </div>
                </div>

                <!-- Cartão de Crédito Content -->
                <div id="creditContent" class="payment-content">
                    <div class="form-group">
                        <label>Número do cartão</label>
                        <div id="form-checkout__cardNumber" class="mp-card-field"></div>
                    </div>

                    <div class="form-group">
                        <label>Data de validade</label>
                        <div id="form-checkout__expirationDate" class="mp-card-field"></div>
                    </div>

                    <div class="form-group">
                        <label>CVV</label>
                        <div id="form-checkout__securityCode" class="mp-card-field"></div>
                    </div>

                    <div class="form-group">
                        <label>Nome no cartão</label>
                        <input type="text" id="form-checkout__cardholderName" class="cardholder-name-input"
                            placeholder="Como está no cartão" />
                    </div>

                    <div class="form-group">
                        <label>Banco emissor</label>
                        <select id="form-checkout__issuer" class="form-select">
                            <option value="" disabled selected>Selecione o banco</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Parcelas</label>
                        <select id="form-checkout__installments" class="form-select">
                            <option value="" disabled selected>Selecione as parcelas</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Tipo de documento</label>
                        <select id="form-checkout__identificationType" class="form-select">
                            <option value="" disabled selected>Selecione o tipo</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Número do documento</label>
                        <input type="text" id="form-checkout__identificationNumber" class="cpf-input"
                            placeholder="Número do documento" />
                    </div>

                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="form-checkout__email" class="email-input" placeholder="seu@email.com" />
                    </div>

                    <!-- Campos ocultos necessários -->
                    <input id="token" name="token" type="hidden" />
                    <input id="paymentMethodId" name="paymentMethodId" type="hidden" />
                    <input id="transactionAmount" name="transactionAmount" type="hidden" value="" />
                    <input id="description" name="description" type="hidden" value="" />

                    <button class="btn-pagar" id="creditPaymentButton">
                        Pagar com cartão de crédito
                    </button>
                </div>

                <!-- Cartão de Débito Content -->
                <div id="debitContent" class="payment-content">
                    <div class="form-group">
                        <label>Número do cartão</label>
                        <div id="debit-form-checkout__cardNumber" class="mp-card-field"></div>
                    </div>

                    <div class="form-group">
                        <label>Data de validade</label>
                        <div id="debit-form-checkout__expirationDate" class="mp-card-field"></div>
                    </div>

                    <div class="form-group">
                        <label>CVV</label>
                        <div id="debit-form-checkout__securityCode" class="mp-card-field"></div>
                    </div>

                    <div class="form-group">
                        <label>Nome no cartão</label>
                        <input type="text" id="debit-form-checkout__cardholderName" class="cardholder-name-input"
                            placeholder="Como está no cartão" />
                    </div>

                    <div class="form-group">
                        <label>Tipo de documento</label>
                        <select id="debit-form-checkout__identificationType" class="form-select">
                            <option value="" disabled selected>Selecione o tipo</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Número do documento</label>
                        <input type="text" id="debit-form-checkout__identificationNumber" class="cpf-input"
                            placeholder="Número do documento" />
                    </div>

                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="debit-form-checkout__email" class="email-input"
                            placeholder="seu@email.com" />
                    </div>

                    <!-- Campos ocultos necessários -->
                    <input id="debit-token" name="debit-token" type="hidden" />
                    <input id="debit-paymentMethodId" name="debit-paymentMethodId" type="hidden" />

                    <button class="btn-pagar" id="debitPaymentButton">
                        Pagar com cartão de débito
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p class="footer__names">
            <img src="../img/nome_rosa.png" alt="Giovanna & Erick" />
        </p>
        <p class="footer__date">21 · Novembro · 2026 · Lua de Mel</p>
    </footer>

    <script>
        // Variáveis globais
        let currentPresente = null;
        let valorContribuicao = null;
        let pollingInterval = null;
        let mp = null;
        let creditCardFields = null;
        let debitCardFields = null;
        let currentBin = null;
        let identificationTypes = [];
        let debounceTimeout = null;

        const API_BASE = "/.netlify/functions";

        function getIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get("id");
        }

        function capitalizar(str) {
            if (!str) return "";
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function escapeHTML(str) {
            if (!str) return "";
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        function showToast(message, type = "success") {
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.textContent = message;

        function createSelectElementPlaceholder(element, placeholder) {
            if (!element) return;
            const optionElement = document.createElement("option");
            optionElement.textContent = placeholder;
            optionElement.setAttribute("selected", "");
            optionElement.setAttribute("disabled", "");
            element.appendChild(optionElement);

        function clearSelectAndSetPlaceholder(element, placeholder) {
            if (!element) return;
            element.innerHTML = "";
            const option = document.createElement("option");
            option.value = "";
            option.disabled = true;
            option.selected = true;
            option.textContent = placeholder;
            element.appendChild(option);
        }

        function createSelectOptions(elem, options, labelsAndKeys = { label: "name", value: "id" }) {
            if (!elem) return;
            const { label, value } = labelsAndKeys;
            const currentValue = elem.value;

            // Limpa e mantém apenas o placeholder
            const hasPlaceholder = elem.options.length === 1 && elem.options[0]?.disabled;
            if (hasPlaceholder) {
                elem.innerHTML = "";
                const placeholder = document.createElement("option");
                placeholder.value = "";
                placeholder.disabled = true;
                placeholder.selected = true;
                placeholder.textContent = elem.options[0]?.textContent || "Selecione uma opção";
                elem.appendChild(placeholder);
            } else {
                const placeholder = elem.querySelector("option[disabled][selected]");
                elem.innerHTML = "";
                if (placeholder) elem.appendChild(placeholder.cloneNode(true));
            }

            options.forEach((option) => {
                const optValue = option[value];
                const optLabel = option[label];
                const opt = document.createElement("option");
                opt.value = optValue;
                opt.textContent = optLabel;
                if (currentValue && optValue == currentValue) opt.selected = true;
                elem.appendChild(opt);
            });
        }

        function applyDocumentMask(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 14) value = value.slice(0, 14);

            if (value.length <= 11) {
                if (value.length <= 3) input.value = value;
                else if (value.length <= 6) input.value = `${value.slice(0, 3)}.${value.slice(3)}`;
                else if (value.length <= 9) input.value = `${value.slice(0, 3)}.${value.slice(3, 6)}.${value.slice(6)}`;
                else input.value = `${value.slice(0, 3)}.${value.slice(3, 6)}.${value.slice(6, 9)}-${value.slice(9, 11)}`;
            } else {
                if (value.length <= 2) input.value = value;
                else if (value.length <= 5) input.value = `${value.slice(0, 2)}.${value.slice(2)}`;
                else if (value.length <= 8) input.value = `${value.slice(0, 2)}.${value.slice(2, 5)}.${value.slice(5)}`;
                else if (value.length <= 12) input.value = `${value.slice(0, 2)}.${value.slice(2, 5)}.${value.slice(5, 8)}/${value.slice(8)}`;
                else input.value = `${value.slice(0, 2)}.${value.slice(2, 5)}.${value.slice(5, 8)}/${value.slice(8, 12)}-${value.slice(12, 14)}`;
            }
        }

        async function getIssuers(paymentMethodId, bin) {

        async function getInstallments(amount, bin, paymentMethodId) {
            try {
                if (!amount || amount === '') {
                    console.error("Amount não fornecido");
                    return [];
                }

                let amountStr = String(amount).trim();
                amountStr = amountStr.replace(/[R$\s]/g, '').replace(',', '.');

                const amountNumber = parseFloat(amountStr);
                if (isNaN(amountNumber) || amountNumber <= 0) {
                    console.error("Amount inválido:", amount);
                    return [];
                }

                const response = await mp.getInstallments({
                    amount: amountStr,
                    bin: bin,
                    paymentTypeId: 'credit_card'
                });

                if (response && response.length > 0) {
                    let installmentsInfo = response[0];
                    if (paymentMethodId) {
                        const found = response.find(item => item.payment_method_id === paymentMethodId);
                        if (found) installmentsInfo = found;
                    }

                    if (installmentsInfo?.payer_costs?.length > 0) {
                        return installmentsInfo.payer_costs;
                    }
                }
                return [];
            } catch (e) {
                console.error("Erro ao buscar parcelas:", e);
                return [];
            }
        }

        function updatePCIFieldsSettings(paymentMethod, cardNumberElement, securityCodeElement) {
            if (!paymentMethod?.settings?.[0]) return;
            const { settings } = paymentMethod;
            const cardNumberSettings = settings[0]?.card_number;
            const securityCodeSettings = settings[0]?.security_code;
            if (cardNumberSettings && cardNumberElement) cardNumberElement.update({ settings: cardNumberSettings });
            if (securityCodeSettings && securityCodeElement) securityCodeElement.update({ settings: securityCodeSettings });
        }

        async function setupCardBinListener(cardNumberElement, type = "credit") {
            if (!cardNumberElement) return;

            const issuerElementId = type === "credit" ? "form-checkout__issuer" : "debit-form-checkout__issuer";
            const installmentsElementId = type === "credit" ? "form-checkout__installments" : "debit-form-checkout__installments";
            const paymentMethodIdInputId = type === "credit" ? "paymentMethodId" : "debit-paymentMethodId";

            const issuerElement = document.getElementById(issuerElementId);
            const installmentsElement = document.getElementById(installmentsElementId);
            const paymentMethodIdInput = document.getElementById(paymentMethodIdInputId);

            cardNumberElement.on("binChange", async (data) => {
                const { bin } = data;

                if (debounceTimeout) clearTimeout(debounceTimeout);

                debounceTimeout = setTimeout(async () => {
                    try {
                        if (!bin || bin.length < 6) {
                            if (issuerElement) clearSelectAndSetPlaceholder(issuerElement, "Selecione o banco");
                            if (installmentsElement) clearSelectAndSetPlaceholder(installmentsElement, "Selecione as parcelas");
                            if (paymentMethodIdInput) paymentMethodIdInput.value = "";
                            currentBin = null;
                            return;
                        }

                        if (bin !== currentBin) {
                            const { results } = await mp.getPaymentMethods({ bin });
                            const paymentMethod = results[0];

                            if (paymentMethod) {
                                if (paymentMethodIdInput) {
                                    paymentMethodIdInput.value = paymentMethod.id;
                                }

                                updatePCIFieldsSettings(paymentMethod, cardNumberElement,
                                    type === "credit" ? creditCardFields?.securityCode : debitCardFields?.securityCode);

                                if (type === "credit") {
                                    const issuers = await getIssuers(paymentMethod.id, bin);
                                    if (issuerElement) {
                                        if (issuers.length > 0) {
                                            createSelectOptions(issuerElement, issuers, { label: "name", value: "id" });
                                        } else {
                                            clearSelectAndSetPlaceholder(issuerElement, "Banco emissor (não disponível)");
                                        }
                                    }

                                    // 🔽 CORREÇÃO: Usa getValorContribuicao() ou fallback
                                    let amount = getValorContribuicao();
                                    if (!amount || amount <= 0) {
                                        // Se não tem valor definido, usa um valor padrão ou mostra mensagem
                                        amount = currentPresente?.preco || 100;
                                    }

                                    // Garante que é um número válido
                                    let cleanAmount = typeof amount === 'string' ?
                                        parseFloat(amount.replace(/[R$\s]/g, '').replace(',', '.')) :
                                        amount;

                                    if (isNaN(cleanAmount) || cleanAmount <= 0) {
                                        cleanAmount = 100; // fallback seguro
                                    }

                                    const installmentOptions = await getInstallments(String(cleanAmount), bin, paymentMethod.id);
                                    if (installmentsElement) {
                                        if (installmentOptions.length > 0) {
                                            createSelectOptions(installmentsElement, installmentOptions, {
                                                label: "recommended_message",
                                                value: "installments"
                                            });
                                        } else {
                                            clearSelectAndSetPlaceholder(installmentsElement, "Selecione as parcelas");
                                            if (cleanAmount > 0) {
                                                const fallbackOption = [{
                                                    installments: 1,
                                                    recommended_message: `1x de R$ ${cleanAmount.toFixed(2)} sem juros`,
                                                    total_amount: cleanAmount
                                                }];
                                                createSelectOptions(installmentsElement, fallbackOption, {
                                                    label: "recommended_message",
                                                    value: "installments"
                                                });
                                            }
                                        }
                                    }
                                }
                            }
                            currentBin = bin;
                        }
                    } catch (e) {
                        console.error("error in binChange: ", e);
                    }
                }, 500);
            });
        }

        async function processCreditPayment() {
            const amount = getValorContribuicao();
            if (!amount) return;

            const cardholderName = document.getElementById("form-checkout__cardholderName")?.value.toUpperCase();
            const identificationType = document.getElementById("form-checkout__identificationType")?.value;
            const identificationNumberRaw = document.getElementById("form-checkout__identificationNumber")?.value;

            const email = document.getElementById("form-checkout__email")?.value;
            const issuerId = document.getElementById("form-checkout__issuer")?.value;
            const installments = parseInt(document.getElementById("form-checkout__installments")?.value || "1");
            const paymentMethodIdInput = document.getElementById("paymentMethodId");

            if (!cardholderName) { showToast("Preencha o nome do titular do cartão", "error"); return; }
            if (!identificationType || identificationType === "") { showToast("Selecione o tipo de documento", "error"); return; }
            if (!identificationNumber || identificationNumber.length < 11) { showToast("Número de documento inválido", "error"); return; }
            if (!email || !email.includes("@")) { showToast("Preencha um e-mail válido", "error"); return; }
            if (installments > 1 && !issuerId) { showToast("Selecione o banco emissor para parcelamento", "error"); return; }
            if (!creditCardFields) { showToast("Sistema de pagamento não inicializado. Tente novamente.", "error"); return; }

            showToast("Processando pagamento...", "info");

            try {
                const cardToken = await mp.fields.createCardToken({
                    cardholderName: cardholderName,
                    identificationType: identificationType,
                    identificationNumber: identificationNumber,
                });

                let cardBrand = "visa";
                try {
                    const cardInfo = await mp.fields.getCardInfo();
                    cardBrand = cardInfo.cardNumber?.paymentMethod?.id || "visa";
                } catch (e) { }

                const paymentMethodId = cardBrand === "visa" ? "visa" : cardBrand === "master" ? "master" : cardBrand === "amex" ? "amex" : "visa";

                const response = await fetch(`${API_BASE}/create-card-payment`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        amount: amount,
                        description: currentPresente.nome,
                        token: cardToken.id,
                        paymentMethodId: paymentMethodId,
                        installments: installments,
                        issuerId: issuerId || undefined,
                        identificationType: identificationType,
                        identificationNumber: identificationNumber,
                        payerEmail: email,
                        cardBrand: cardBrand,
                        paymentType: "credit",
                    }),
                });

                const data = await response.json();

                if (data.success && data.status === "approved") {
                    showToast("Pagamento aprovado! Obrigado por contribuir!", "success");
                    setTimeout(() => { closeModal(); window.location.reload(); }, 2000);
                } else if (data.status === "in_process") {
                    showToast("Pagamento em processamento. Aguarde...", "info");
                    startPaymentPolling(data.paymentId);
                } else {
                    throw new Error(data.statusDetail || data.error || "Pagamento não aprovado");
                }
            } catch (error) {
                console.error("Erro detalhado:", error);
                showToast(`${error.message}`, "error");
            }
        }

        function startPaymentPolling(paymentId) {
            if (pollingInterval) clearInterval(pollingInterval);
            let attempts = 0;
            const maxAttempts = 60;

            pollingInterval = setInterval(async () => {
                attempts++;
                try {
                    const response = await fetch(`${API_BASE}/check-payment?id=${paymentId}`);
                    const data = await response.json();

                    if (data.success) {
                        if (data.status === "approved") {
                            clearInterval(pollingInterval);
                            pollingInterval = null;
                            showToast("Pagamento confirmado! Obrigado por contribuir!", "success");
                            closeModal();
                            setTimeout(() => window.location.reload(), 2000);
                        } else if (data.status === "rejected") {
                            clearInterval(pollingInterval);
                            pollingInterval = null;
                            showToast("Pagamento recusado. Tente novamente.", "error");
                        }
                    }
                    if (attempts >= maxAttempts) {
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                        showToast("Tempo de verificação esgotado. Verifique o status do pagamento.", "info");
                    }
                } catch (error) {
                    console.error("Erro ao verificar status:", error);
                }
            }, 5000);
        }

        function setupPaymentMethodSwitch() {
            document.querySelectorAll(".payment-btn").forEach((btn) => {
                btn.removeEventListener("click", btn._handler);

                const handler = async () => {
                    const method = btn.dataset.method;

                    document.querySelectorAll(".payment-btn").forEach((b) => b.classList.remove("active"));
                    btn.classList.add("active");

                    document.querySelectorAll(".payment-content").forEach((c) => c.classList.remove("active"));
                    document.getElementById(`${method}Content`).classList.add("active");

                    unmountCardFields();

                    if (method === "credit") {
                        await initCreditCardFields();
                        setupDocumentMaskListeners();
                    } else if (method === "debit") {
                        await initDebitCardFields();
                        setupDocumentMaskListeners();
                    } else if (method === "pix") {
                        const pixPlaceholder = document.getElementById("pixPlaceholder");
                        const pixGeneratedContent = document.getElementById("pixGeneratedContent");
                        if (pixPlaceholder && pixGeneratedContent) {
                            pixPlaceholder.style.display = "block";
                            pixGeneratedContent.style.display = "none";
                        }
                    }
                };

                btn._handler = handler;
                btn.addEventListener("click", handler);
            });
        }

        async function carregarDetalhe() {
            const id = getIdFromURL();
            if (!id) { mostrarErro("ID não informado"); return; }
            try {
                const response = await fetch("/data/lua_de_mel.json");
                if (!response.ok) throw new Error("Erro ao carregar dados");
                const data = await response.json();
                const presente = data.presentes.find(p => p.id === parseInt(id));
                if (!presente) { mostrarErro("Experiência não encontrada"); return; }
                currentPresente = presente;
                renderizarDetalhe(presente);
            } catch (error) {
                console.error(error);
                mostrarErro("Erro ao carregar detalhes");
            }
        }

        function renderizarDetalhe(presente) {
            const container = document.getElementById("detalheContent");
            const precoFormatado = presente.preco > 0 ? presente.preco.toLocaleString("pt-BR", { minimumFractionDigits: 2 }) : "Valor Livre";
            const isValorLivre = presente.preco === 0;

            let botoes = `
        <div class="btn-group">
            <button class="btn-presentear" onclick="openModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8M16 6l-4-4-4 4M12 2v12"/></svg>
                Contribuir
            </button>
        </div>
    `;

            const html = `
        <article class="detalhe-card">
            <div class="detalhe-imagem">
                ${presente.imagem ? `<img src="${escapeHTML(presente.imagem)}" alt="${escapeHTML(presente.nome)}">` : `<div class="detalhe-placeholder">${presente.icone || "🌙"}</div>`}
            </div>
            <div class="detalhe-info">
                <span class="detalhe-categoria">${capitalizar(presente.categoria)}</span>
                <h1>${escapeHTML(presente.nome)}</h1>
                <span class="detalhe-ribbon ribbon--available">Disponível</span>
                <div class="detalhe-preco">
                    <strong>Contribuição:</strong>
                    <span>${precoFormatado}</span>
                    ${isValorLivre ? '<span class="valor-livre-badge">Você escolhe o valor</span>' : ''}
                </div>
                <p class="detalhe-descricao">${escapeHTML(presente.descricao)}</p>
                ${presente.detalhes?.length ? `
                    <div class="detalhe-especificacoes">
                        <h3>Detalhes</h3>
                        <ul>${presente.detalhes.map(d => `<li>${escapeHTML(d)}</li>`).join("")}</ul>
                    </div>
                ` : ""}
                ${isValorLivre ? `
                    <div class="valor-livre-input">
                        <label>Qual valor você deseja contribuir?</label>
                        <input type="number" id="valorLivreInput" step="0.01" min="1" placeholder="R$ 0,00" value="50.00">
                    </div>
                ` : ""}
                <div class="detalhe-acoes">
                    ${botoes}
                </div>
            </div>
        </article>
    `;
            container.innerHTML = html;
        }

        document.addEventListener("DOMContentLoaded", async () => {
            setupPaymentMethodSwitch();
            await carregarDetalhe();
            setupDocumentMaskListeners();

            const creditButton = document.getElementById("creditPaymentButton");
            const debitButton = document.getElementById("debitPaymentButton");

            if (creditButton) creditButton.addEventListener("click", processCreditPayment);
            if (debitButton) debitButton.addEventListener("click", processDebitPayment);
        });

        window.onclick = function (event) {
            const modal = document.getElementById("paymentModal");
            if (event.target === modal) closeModal();
        };

        const toggle = document.getElementById("navToggle");
        const links = document.getElementById("navLinks");
        if (toggle && links) {
            toggle.addEventListener("click", () => {
                links.classList.toggle("open");
                const spans = toggle.querySelectorAll("span");
                if (links.classList.contains("open")) {
                    spans[0].style.transform = "translateY(6.8px) rotate(45deg)";
                    spans[1].style.opacity = "0";
                    spans[2].style.transform = "translateY(-6.5px) rotate(-45deg)";
                } else {
                    spans.forEach(s => { s.style.transform = ""; s.style.opacity = ""; });
                }
            });
        }
    </script>
</body>

</html>
